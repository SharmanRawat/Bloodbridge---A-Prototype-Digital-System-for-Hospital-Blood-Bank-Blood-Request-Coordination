<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BloodBridge – Delivery Tracker</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
  body { background:#f8f9fa; font-family:system-ui,sans-serif; }
  .container { max-width:450px; margin:2rem auto; text-align:center; }
  .btn-bb-red { background:#C62828; color:white; border:none; border-radius:10px; padding:0.75rem 1.5rem; font-weight:600; }
  .btn-bb-outline { border:1px solid #C62828; color:#C62828; background:white; border-radius:10px; padding:0.75rem 1.5rem; font-weight:600; }
  .btn-bb-outline:hover { background:#fdecec; }
  .form-control { height:48px; border-radius:10px; }
  .otp-box { background:#d4edda; border:1px solid #c3e6cb; border-radius:10px; padding:1rem; margin-top:1rem; }
  .otp-value { font-size:2rem; font-weight:800; letter-spacing:0.15em; color:#155724; }
</style>
</head>
<body>
<div class="container py-4">
  <h3>🩸 Blood Delivery</h3>
  <p id="statusText">Choose a method to start tracking</p>

  <!-- Manual coordinate entry (always visible) -->
  <div class="mb-3">
    <p class="text-muted small">Enter coordinates (if you don't have GPS)</p>
    <input type="number" id="manualLat" class="form-control mb-1" placeholder="Latitude (e.g. 22.3072)" step="any">
    <input type="number" id="manualLng" class="form-control mb-1" placeholder="Longitude (e.g. 73.1812)" step="any">
    <button id="manualStartBtn" class="btn btn-bb-red w-100" onclick="startManualSending()">📡 Start Sending (Manual)</button>
    <p class="text-muted small mt-1">Coordinates will be sent every 5 seconds. Enter new values and click again to update.</p>
  </div>

  <hr>

  <!-- GPS option (only if available) -->
  <div id="gpsSection">
    <button id="gpsStartBtn" class="btn btn-bb-outline w-100" onclick="startGpsTracking()" disabled>📍 Use GPS</button>
    <p class="text-muted small mt-1">Works best on mobile phones with location enabled.</p>
  </div>

  <!-- OTP display (filled by JavaScript) -->
  <div id="otpContainer"></div>

  <!-- Pickup confirmation button (appears after OTP verified) -->
  <div id="pickupConfirmContainer"></div>
</div>

<script>
let pickupButtonShown = false;
const params = new URLSearchParams(window.location.search);
console.log('URL search:', window.location.search);
console.log('Extracted ID:', new URLSearchParams(window.location.search).get('id'));
const requestId = new URLSearchParams(window.location.search).get('id');
if (!requestId) {
  document.getElementById('statusText').textContent = '❌ Missing request ID. Please use the correct tracking link.';
  document.getElementById('statusText').style.color = 'red';
  // Hide all buttons/inputs
  document.querySelectorAll('button, input').forEach(el => el.style.display = 'none');
}

const socket = io();
console.log('✅ Delivery page loaded, socket connected:', socket.id);

let manualInterval = null;
let gpsWatchId = null;
let statusPollInterval = null;

// Helper to send a single location update
function emitLocation(lat, lng) {
  console.log('📤 Emitting donor_location:', { donorId:requestId, lat, lng });
  socket.emit('donor_location', { donorId:requestId, lat, lng });
  document.getElementById('statusText').textContent = `📍 Location sent: ${lat.toFixed(5)}, ${lng.toFixed(5)}`;
}

// ======================================================================
// MANUAL COORDINATE MODE
// ======================================================================
function startManualSending() {
  if (gpsWatchId) { navigator.geolocation.clearWatch(gpsWatchId); gpsWatchId = null; }
  if (manualInterval) clearInterval(manualInterval);

  const lat = parseFloat(document.getElementById('manualLat').value);
  const lng = parseFloat(document.getElementById('manualLng').value);
  if (isNaN(lat) || isNaN(lng)) {
    alert('Please enter valid coordinates.');
    return;
  }

  emitLocation(lat, lng);
  manualInterval = setInterval(() => emitLocation(lat, lng), 5000);

  document.getElementById('statusText').textContent = `🔁 Sending location every 5s (${lat.toFixed(5)}, ${lng.toFixed(5)})`;
  pickupButtonShown = false;
  // Fetch OTP and start polling for status changes
  fetchOTP();
  if (statusPollInterval) clearInterval(statusPollInterval);
  statusPollInterval = setInterval(fetchOTP, 5000);
}

// ======================================================================
// GPS MODE (mobile devices)
// ======================================================================
function startGpsTracking() {
  if (!navigator.geolocation) return;

  if (manualInterval) { clearInterval(manualInterval); manualInterval = null; }
  if (gpsWatchId) { navigator.geolocation.clearWatch(gpsWatchId); gpsWatchId = null; }

  document.getElementById('gpsStartBtn').disabled = true;
  document.getElementById('statusText').textContent = 'Acquiring GPS…';

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      emitLocation(pos.coords.latitude, pos.coords.longitude);
      document.getElementById('statusText').textContent = '🛵 Tracking active (GPS). Keep this page open.';
      pickupButtonShown = false;
      fetchOTP();
      if (statusPollInterval) clearInterval(statusPollInterval);
      statusPollInterval = setInterval(fetchOTP, 5000);

      gpsWatchId = navigator.geolocation.watchPosition(
        (p) => emitLocation(p.coords.latitude, p.coords.longitude),
        (err) => {
          document.getElementById('statusText').textContent = 'GPS error: ' + err.message;
          document.getElementById('gpsStartBtn').disabled = false;
        },
        { enableHighAccuracy:true, maximumAge:3000, timeout:8000 }
      );
    },
    (err) => {
      alert('GPS not available. Please use manual coordinates instead.');
      document.getElementById('gpsStartBtn').disabled = false;
    },
    { enableHighAccuracy:true, timeout:8000, maximumAge:0 }
  );
}

// ======================================================================
// FETCH OTP AND POLL STATUS
// ======================================================================
async function fetchOTP() {
  try {
    const res = await fetch(`/api/hospital/request/${requestId}`);
    const data = await res.json();

    // Show OTP if not already displayed
    if (data.pickup_otp && !document.getElementById('otpContainer').innerHTML) {
      document.getElementById('otpContainer').innerHTML = `
        <div class="otp-box">
          <strong>Pickup OTP</strong>
          <div class="otp-value">${data.pickup_otp}</div>
          <small class="text-muted">Show this code at the blood bank</small>
        </div>`;
    }

    // If OTP has been verified (status = 'Ready') and button not yet shown
    if (data.status === 'Ready' && !pickupButtonShown) {
        pickupButtonShown = true;
        if (statusPollInterval) clearInterval(statusPollInterval);

        const container = document.getElementById('pickupConfirmContainer');
        container.innerHTML = '';
        const confirmDiv = document.createElement('div');
        confirmDiv.className = 'mt-3';
        confirmDiv.innerHTML = `<button id="confirmPickupBtn" class="btn btn-success w-100" onclick="confirmPickup()">✅ I have the blood bag</button>`;
        container.appendChild(confirmDiv);
    }

    // If already 'OutForDelivery', show success message and stop polling
    if (data.status === 'OutForDelivery' && !document.getElementById('pickupConfirmedMsg')) {
      const msg = document.createElement('div');
      msg.className = 'alert alert-success mt-3';
      msg.id = 'pickupConfirmedMsg';
      msg.textContent = '✅ Blood bag received – Out for Delivery';
      document.getElementById('pickupConfirmContainer').appendChild(msg);
      if (statusPollInterval) clearInterval(statusPollInterval);
    }
  } catch (err) {
    console.error('Status poll error:', err);
  }
}

// ======================================================================
// CONFIRM PICKUP
// ======================================================================
async function confirmPickup() {
  const btn = document.getElementById('confirmPickupBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Confirming…'; }

  try {
    const res = await fetch(`/api/delivery/confirm-pickup/${requestId}`, { method: 'PUT' });
    const data = await res.json();
    if (data.success) {
      document.getElementById('pickupConfirmContainer').innerHTML = '<div class="alert alert-success">✅ Blood bag received – Out for Delivery</div>';
      if (statusPollInterval) clearInterval(statusPollInterval);
    } else {
      alert('Failed: ' + (data.error || 'unknown'));
      if (btn) { btn.disabled = false; btn.textContent = '✅ I have the blood bag'; }
    }
  } catch (err) {
    console.error(err);
    alert('Network error');
    if (btn) { btn.disabled = false; btn.textContent = '✅ I have the blood bag'; }
  }
}

// Enable GPS button if geolocation exists
if (navigator.geolocation) {
  document.getElementById('gpsStartBtn').disabled = false;
} else {
  document.getElementById('gpsSection').style.display = 'none';
}
</script>
</body>
</html>
