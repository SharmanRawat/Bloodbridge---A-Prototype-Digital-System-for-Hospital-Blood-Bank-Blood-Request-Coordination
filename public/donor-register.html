<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BloodBridge – Donor Registration</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <style>
    :root{ --bb-red:#C62828; --bb-bg:#f8f9fa; --bb-text:#212529; }
    body{background:var(--bb-bg);color:var(--bb-text);font-family:system-ui,sans-serif;}
    .btn-bb-red{background:var(--bb-red);color:white;font-weight:600;border-radius:10px;padding:0.5rem 1rem;border:none;}
    .container{max-width:500px;margin:3rem auto;}
  </style>
</head>
<body>
  <div class="container">
    <h2>🩸 Become a Blood Donor</h2>
    <p class="text-muted">Register to help in emergencies near you.</p>
    <form id="donorForm">
      <div class="mb-3">
        <label class="form-label">Patient Name / Reason (optional)</label>
        <input type="text" id="patientRef" class="form-control" placeholder="e.g., For emergency patient Ramesh">
      </div>
      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" id="name" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Blood Group</label>
        <select id="bloodGroup" class="form-select" required>
          <option value="">Select</option>
          <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
          <option>O+</option><option>O-</option><option>AB+</option><option>AB-</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Phone Number</label>
        <input type="tel" id="phone" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">City (optional)</label>
        <input type="text" id="city" class="form-control">
      </div>
      <div class="mb-3">
        <button type="button" id="useLocationBtn" class="btn btn-outline-secondary w-100">
          <i class="fa-solid fa-location-crosshairs me-1"></i> Use My Current Location
        </button>
        <small class="text-muted">We'll use your location to show distance from blood banks.</small>
        <input type="hidden" id="lat">
        <input type="hidden" id="lng">
      </div>
      <button type="submit" class="btn btn-bb-red w-100">Register as Donor</button>
    </form>
    <div id="message" class="mt-3"></div>
  </div>

  <script>
    // GPS logic
    document.getElementById('useLocationBtn').addEventListener('click', () => {
      const btn = document.getElementById('useLocationBtn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-1"></i> Fetching location…';
      if (!navigator.geolocation) {
        alert('Geolocation not supported.');
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-location-crosshairs me-1"></i> Use My Current Location';
        return;
      }
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          document.getElementById('lat').value = pos.coords.latitude;
          document.getElementById('lng').value = pos.coords.longitude;
          btn.classList.remove('btn-outline-secondary');
          btn.classList.add('btn-success');
          btn.innerHTML = '<i class="fa-solid fa-check me-1"></i> Location Set';
          btn.disabled = true;
        },
        (err) => {
          alert('Could not get location. Please try again.');
          btn.disabled = false;
          btn.innerHTML = '<i class="fa-solid fa-location-crosshairs me-1"></i> Use My Current Location';
        },
        { enableHighAccuracy: true, timeout: 5000 }
      );
    });

    // Form submission
    document.getElementById('donorForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const submitBtn = document.querySelector('#donorForm button[type="submit"]');
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-1"></i> Registering…';
        console.log('Form submitted');

        const name = document.getElementById('name').value.trim();
        const bloodGroup = document.getElementById('bloodGroup').value;
        const phone = document.getElementById('phone').value.trim();
        const city = document.getElementById('city').value.trim();
        const lat = document.getElementById('lat').value;
        const lng = document.getElementById('lng').value;
        const patientRef = document.getElementById('patientRef').value.trim();

        if (!name || !bloodGroup || !phone) {
            alert('Please fill all required fields.');
            // Re‑enable the button so the user can try again
            submitBtn.disabled = false;
            submitBtn.innerHTML = 'Register as Donor';
            return;
        }

        try {
            console.log('About to fetch /api/donors/register');
            const res = await fetch('/api/donors/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                name,
                blood_group: bloodGroup,
                phone,
                city,
                lat: parseFloat(lat) || null,
                lng: parseFloat(lng) || null,
                patient_ref: patientRef || null
            })
            });

            const data = await res.json();
            if (data.success) {
            document.getElementById('message').innerHTML = '<div class="alert alert-success">Thank you for registering!</div>';
            document.getElementById('donorForm').reset();
            // Re‑enable the button for the next donor
            submitBtn.disabled = false;
            submitBtn.innerHTML = 'Register as Donor';
            } else {
            document.getElementById('message').innerHTML = '<div class="alert alert-danger">' + (data.error || 'Registration failed') + '</div>';
            submitBtn.disabled = false;
            submitBtn.innerHTML = 'Register as Donor';
            }
        } catch (err) {
            submitBtn.disabled = false;
            submitBtn.innerHTML = 'Register as Donor';
            console.error(err);
            document.getElementById('message').innerHTML = '<div class="alert alert-danger">Network error. Check console.</div>';
        }
    });
  </script>
</body>
</html>
