<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BloodBridge – Start Delivery</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body{background:#f8f9fa;font-family:system-ui,sans-serif;}
  .container{max-width:400px;margin:3rem auto;text-align:center;}
  .btn-bb-red{background:#C62828;color:white;font-weight:600;border:none;border-radius:10px;padding:0.7rem 1.5rem;}
</style>
</head>
<body>
<div class="container">
  <h3>🩸 Start Delivery</h3>
  <input type="number" id="requestId" class="form-control mb-3" placeholder="Enter Request ID (e.g. 25)">
  <button class="btn btn-bb-red w-100" onclick="start()">Start Delivery</button>
  <p id="errorMsg" class="text-danger mt-2"></p>
</div>
<script>
function start() {
  const id = document.getElementById('requestId').value.trim();
  if (!id || isNaN(id)) { document.getElementById('errorMsg').textContent='Please enter a valid Request ID.'; return; }
  window.location.href = `track-delivery.html?id=${id}`;
}
</script>
</body>
</html>
