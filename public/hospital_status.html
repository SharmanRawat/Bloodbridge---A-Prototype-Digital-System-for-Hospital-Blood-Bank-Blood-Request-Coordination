<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request Status - BloodBridge</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link href="style.css" rel="stylesheet" />
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg bb-navbar sticky-top">
  <div class="container">
    <a class="bb-brand" href="index.html"><span class="dot">🩸</span> BloodBridge</a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <i class="fa-solid fa-bars"></i>
    </button>
    <div class="collapse navbar-collapse justify-content-end" id="nav">
      <ul class="navbar-nav align-items-lg-center">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="hospital.html">Hospital</a></li>
        <li class="nav-item"><a class="nav-link" href="bloodbank.html">Blood Bank</a></li>
        <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
      </ul>
    </div>
    </div>
  </nav>
  <div class="container py-4">
    <h1 class="mb-4">BloodBridge – Hospital Request Status</h1>
    <div class="d-flex gap-2 mb-3">
      <a href="hospital.html" class="btn btn-outline-primary">New Request</a>
      <button id="refreshBtn" class="btn btn-secondary">Refresh</button>
    </div>
    <div id="statusList"></div>
  </div>

  <script>
    const statusList = document.getElementById('statusList');
    const refreshBtn = document.getElementById('refreshBtn');

    async function loadStatus() {
      const res = await fetch('/api/hospital/requests/1');
      const data = await res.json();
      if (data.length === 0) {
        statusList.innerHTML = '<div class="alert alert-info">No requests yet.</div>';
        return;
      }
      statusList.innerHTML = data.map(req => `
        <div class="card mb-2">
          <div class="card-body">
            <h5 class="card-title">Request #${req.id} (${req.blood_group})</h5>
            <p>
              Units: ${req.units} | Urgency: ${req.urgency}<br>
              Status: <span class="badge bg-${req.status === 'Pending' ? 'warning' : req.status === 'Acknowledged' ? 'success' : 'secondary'}">${req.status}</span><br>
              Blood Bank: ${req.bank_name || 'Not yet selected'}<br>
              Created: ${new Date(req.created_at).toLocaleString()}
            </p>
            ${req.status === 'Acknowledged' ? '<span class="text-success">✔ Blood bank has acknowledged and is preparing the units.</span>' : ''}
            <a href="requisition.html?id=${req.id}" class="btn btn-sm btn-outline-secondary">View Slip</a>
          </div>
        </div>
      `).join('');
    }

    refreshBtn.addEventListener('click', loadStatus);
    setInterval(loadStatus, 10000);
    loadStatus();
  </script>
</body>
</html>
