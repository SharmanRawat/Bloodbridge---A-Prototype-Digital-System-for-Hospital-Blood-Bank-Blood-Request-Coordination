<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BloodBridge - Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5" style="max-width: 500px;">
    <h2 class="text-center mb-4">Register</h2>
    <div id="errorMsg" class="alert alert-danger" style="display:none;"></div>
    <form id="registerForm">
      <div class="mb-3">
        <label for="role" class="form-label">I am a</label>
        <select id="role" class="form-select" required>
          <option value="">-- Select --</option>
          <option value="hospital">Hospital</option>
          <option value="bloodbank">Blood Bank</option>
        </select>
      </div>
      <div class="mb-3">
        <label for="name" class="form-label">Name</label>
        <input type="text" id="name" class="form-control" required>
      </div>
      <div class="mb-3">
        <label for="address" class="form-label">Address</label>
        <input type="text" id="address" class="form-control">
      </div>
      <div class="row">
        <div class="col mb-3">
          <label for="lat" class="form-label">Latitude</label>
          <input type="number" step="any" id="lat" class="form-control" placeholder="22.45">
        </div>
        <div class="col mb-3">
          <label for="lng" class="form-label">Longitude</label>
          <input type="number" step="any" id="lng" class="form-control" placeholder="73.12">
        </div>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" id="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-danger w-100">Register</button>
    </form>
    <p class="mt-3 text-center">Already have an account? <a href="login.html">Login</a></p>
  </div>

  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const role = document.getElementById('role').value;
      const name = document.getElementById('name').value;
      const address = document.getElementById('address').value;
      const lat = parseFloat(document.getElementById('lat').value) || 0;
      const lng = parseFloat(document.getElementById('lng').value) || 0;
      const password = document.getElementById('password').value;

      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ role, name, address, lat, lng, password })
      });
      const data = await res.json();
      if (data.success) {
        alert('Registration successful! Please login.');
        window.location.href = 'login.html';
      } else {
        document.getElementById('errorMsg').textContent = data.error || 'Registration failed';
        document.getElementById('errorMsg').style.display = 'block';
      }
    });
  </script>
</body>
</html>
