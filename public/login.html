<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BloodBridge – Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <style>
    :root{
      --bb-red:#C62828;
      --bb-red-dark:#9b1c1c;
      --bb-bg:#f8f9fa;
      --bb-text:#212529;
      --bb-muted:#6c757d;
      --bb-border:#dee2e6;
      --bb-radius:12px;
    }
    body{background:var(--bb-bg);color:var(--bb-text);font-family:system-ui,-apple-system,sans-serif;}
    .bb-brand{font-weight:800;font-size:1.25rem;text-decoration:none;color:var(--bb-text);}
    .bb-brand .dot{color:var(--bb-red);}
    .navbar{background-color:#fff !important;box-shadow:0 2px 8px rgba(0,0,0,0.04);z-index:1030;}
    .navbar .nav-link{font-weight:600;color:var(--bb-text);}
    .navbar .nav-link:hover{color:var(--bb-red);}
    .nav-link.active{color:var(--bb-red)!important;}
    .btn-bb-red{background-color:var(--bb-red);border-color:var(--bb-red);color:white;font-weight:600;border-radius:10px;padding:0.5rem 1rem;border:none;}
    .btn-bb-red:hover{background-color:var(--bb-red-dark);color:white;}
    .form-control, .form-select{height:48px;border-radius:10px;}
    .bb-page{padding-top:80px;padding-bottom:80px;}
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container">
    <a class="bb-brand" href="index.html"><span class="dot">🩸</span> BloodBridge</a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <i class="fa-solid fa-bars"></i>
    </button>
    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link active" href="login.html">Login</a></li>
        <li class="nav-item"><a class="nav-link" href="register.html">Register</a></li>
      </ul>
    </div>
  </div>
</nav>

<main class="bb-page">
  <div class="container py-5" style="max-width: 400px;">
    <h2 class="text-center mb-4">BloodBridge Login</h2>
    <div id="errorMsg" class="alert alert-danger" style="display:none;"></div>
    <form id="loginForm">
      <div class="mb-3">
        <label for="role" class="form-label">I am a</label>
        <select id="role" class="form-select" required>
          <option value="">-- Select --</option>
          <option value="hospital">Hospital</option>
          <option value="bloodbank">Blood Bank</option>
        </select>
      </div>
      <div class="mb-3">
        <label for="username" class="form-label">Name (as registered)</label>
        <input type="text" id="username" class="form-control" required>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" id="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-bb-red w-100">Login</button>
    </form>
    <p class="mt-3 text-center">Don't have an account? <a href="register.html">Register</a></p>
  </div>
</main>

<!-- Bootstrap JS bundle (required for navbar toggle) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const role = document.getElementById('role').value;
    const emailOrId = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ role, emailOrId, password })
    });
    const data = await res.json();
    if (data.success) {
      localStorage.setItem('userId', data.userId);
      localStorage.setItem('role', data.role);
      localStorage.setItem('userName', data.name);
      window.location.href = (data.role === 'hospital') ? 'hospital.html' : 'bloodbank.html';
    } else {
      document.getElementById('errorMsg').textContent = data.error || 'Login failed';
      document.getElementById('errorMsg').style.display = 'block';
    }
  });

  // ----- Pre-fill role from index page buttons -----
  (function() {
    const params = new URLSearchParams(window.location.search);
    const roleParam = params.get('role');
    if (roleParam === 'hospital' || roleParam === 'bloodbank') {
      const roleSelect = document.getElementById('role');
      roleSelect.value = roleParam;
      roleSelect.disabled = true;   // user cannot change it
    }
  })();
</script>
</body>
</html>
